## Clustering
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config

## Memory and disk management
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 2GB

## Connection management
heartbeat = 60
frame_max = 131072
channel_max = 2047
connection_max = 1000

## Logging
log.console = true
log.console.level = info
log.file = /var/log/rabbitmq/rabbit.log
log.file.level = info
log.file.rotation.count = 10
log.file.rotation.size = 10485760

## Management plugin
management.tcp.port = 15672
management.tcp.ip = 0.0.0.0

## Default user
default_user = admin
default_pass = password

## Queue settings
queue_master_locator = min-masters

## Networking
listeners.tcp.default = 5672

## SSL settings (if needed)
# listeners.ssl.default = 5671
# ssl_options.cacertfile = /etc/ssl/ca_certificate.pem
# ssl_options.certfile   = /etc/ssl/server_certificate.pem
# ssl_options.keyfile    = /etc/ssl/server_key.pem
# ssl_options.verify     = verify_peer
# ssl_options.fail_if_no_peer_cert = false

## High availability
ha_promote_on_shutdown = when_synced
ha_promote_on_failure = when_synced

## Performance tuning
collect_statistics_interval = 10000
background_gc_target_interval = 60000

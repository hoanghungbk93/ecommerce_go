global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway-1:8080', 'api-gateway-2:8080']
    metrics_path: '/api/v1/metrics'
    scrape_interval: 10s

  - job_name: 'request-handler'
    static_configs:
      - targets: ['request-handler-1:8081', 'request-handler-2:8081']
    metrics_path: '/api/v1/metrics'
    scrape_interval: 10s

  - job_name: 'consumer'
    static_configs:
      - targets: ['consumer-1:8082', 'consumer-2:8082']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # RabbitMQ doesn't expose Prometheus metrics by default
  # - job_name: 'rabbitmq'
  #   static_configs:
  #     - targets: ['rabbitmq:15692']
  #   metrics_path: '/metrics'
  #   scrape_interval: 30s

  # Nginx Prometheus Exporter
  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['nginx-exporter:9113']
    metrics_path: '/metrics'
    scrape_interval: 30s

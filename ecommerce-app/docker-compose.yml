services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://odoo16:hoanghungbk@172.17.0.1:5432/ecommerce?sslmode=disable
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 8080
      VNPAY_TMN_CODE: your-vnpay-tmn-code
      VNPAY_HASH_KEY: your-vnpay-hash-key
      VNPAY_URL: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      VNPAY_RETURN_URL: http://localhost:3001/payment/return
      ENVIRONMENT: production
    ports:
      - "8080:8080"
    networks:
      - ecommerce-network
      - webhook-service_webhook-network
    labels:
      - "logging=promtail"
      - "service=backend"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      REACT_APP_API_URL: http://ecommerce.itmf.com.vn/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ecommerce-network
    labels:
      - "logging=promtail"
      - "service=frontend"

networks:
  ecommerce-network:
    driver: bridge
  webhook-service_webhook-network:
    external: true
